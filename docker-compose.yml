services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - hippie_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Migrations are run manually against the host DB:
      #   docker compose exec web python manage.py migrate
      RUN_MIGRATIONS: "0"
      RUN_COLLECTSTATIC: "1"
    volumes:
      - static_volume:/code/hippie_django/staticfiles
      - media_volume:/code/hippie_django/media
      - ./hippie_django/data:/code/hippie_django/data
      - ./hippie_django/logs:/code/hippie_django/logs
    networks:
      - hippie_net
    # Reach the MariaDB running on the Docker host (DB_HOST=host.docker.internal).
    # 172.18.0.1 = hippie_net gateway (host side of this bridge — same subnet as containers).
    extra_hosts:
      - "host.docker.internal:172.18.0.1"
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Worker should not race the web container on migrate/collectstatic.
      RUN_MIGRATIONS: "0"
      RUN_COLLECTSTATIC: "0"
    command: ["celery", "-A", "hippie", "worker", "-l", "info"]
    volumes:
      - media_volume:/code/hippie_django/media
    networks:
      - hippie_net
    # Reach the MariaDB running on the Docker host (DB_HOST=host.docker.internal).
    # 172.18.0.1 = hippie_net gateway (host side of this bridge — same subnet as containers).
    extra_hosts:
      - "host.docker.internal:172.18.0.1"
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_started

  apache:
    build:
      context: ./docker/apache
    restart: unless-stopped
    environment:
      APACHE_PUBLISHED_PATH: ${APACHE_PUBLISHED_PATH}
    volumes:
      - static_volume:/vol/static:ro
      - media_volume:/vol/media:ro
    ports:
      - "${HOST_PORT:-8080}:80"
    networks:
      - hippie_net
    depends_on:
      - web

networks:
  hippie_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/24
          gateway: 172.18.0.1

volumes:
  static_volume:
  media_volume:
